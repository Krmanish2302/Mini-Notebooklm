# ─────────────────────────────────────────────────────────────────────────────
#  Mini NotebookLM — Plugin Architecture Configuration
#  ─────────────────────────────────────────────────────────────────────────────
#
#  This YAML file defines the plugin system for Mini NotebookLM, enabling:
#    • Runtime plugin discovery and registration
#    • Hot-swappable LLM providers, embedders, and document processors
#    • Extensible retrieval and evaluation backends
#    • Module-level dependency injection
#
#  Generated: 2026-05-10
#  Version: 1.0.0
#
# ─────────────────────────────────────────────────────────────────────────────

plugin_system:
  version: "1.0.0"
  enabled: true
  discovery_path: "src/plugins"
  auto_reload: false
  plugin_manifest: "plugin_manifest.json"

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: LLM PROVIDERS
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define LLM backend integrations.
#  Each provider implements:
#    - invoke(prompt, **kwargs) → str
#    - stream(prompt, **kwargs) → Iterator[str]
#    - update_tuning(temperature, top_p, max_tokens) → None
#

llm_providers:
  # Built-in providers (no plugin registration needed)
  builtin:
    - name: "groq"
      module: "src.core.llm.groq_provider"
      class: "GroqLLM"
      dependencies:
        - groq>=0.4.0
      config:
        api_key_env: "GROQ_API_KEY"
        base_url: "https://api.groq.com"
        models:
          - "llama-3.3-70b-versatile"
          - "mixtral-8x7b-32768"
      supports_streaming: true
      supports_vision: false

    - name: "openai"
      module: "src.core.llm.openai_provider"
      class: "OpenAILLM"
      dependencies:
        - openai>=1.0.0
      config:
        api_key_env: "OPENAI_API_KEY"
        base_url: "https://api.openai.com/v1"
        models:
          - "gpt-4o"
          - "gpt-4-turbo"
          - "gpt-3.5-turbo"
      supports_streaming: true
      supports_vision: true

    - name: "ollama"
      module: "src.core.llm.ollama_provider"
      class: "OllamaLLM"
      dependencies: []
      config:
        api_key_env: null
        base_url_env: "OLLAMA_BASE_URL"
        base_url: "http://localhost:11434"
      supports_streaming: true
      supports_vision: false

  # Plugin slots for custom implementations
  plugins:
    - id: "anthropic_claude"
      name: "Claude (Anthropic)"
      module: "plugins.llm.anthropic_claude"
      class: "ClaudeLLMPlugin"
      version: "1.0.0"
      author: "community"
      dependencies:
        - anthropic>=0.7.0
      config:
        api_key_env: "ANTHROPIC_API_KEY"
      enabled: false

    - id: "azure_openai"
      name: "Azure OpenAI"
      module: "plugins.llm.azure_openai"
      class: "AzureOpenAIPlugin"
      version: "1.0.0"
      author: "community"
      dependencies:
        - openai>=1.0.0
      config:
        api_key_env: "AZURE_OPENAI_KEY"
        deployment_id_env: "AZURE_OPENAI_DEPLOYMENT_ID"
        base_url_env: "AZURE_OPENAI_ENDPOINT"
      enabled: false

    - id: "huggingface_local"
      name: "HuggingFace (Local)"
      module: "plugins.llm.huggingface_local"
      class: "HuggingFaceLocalPlugin"
      version: "1.0.0"
      author: "community"
      dependencies:
        - transformers>=4.30.0
        - torch>=2.0.0
      config:
        model_id: "meta-llama/Llama-2-7b-chat-hf"
        device: "cuda"  # or "cpu"
      enabled: false

# ════════════════════════════════════════════════════════════════════���════════
#  SUBSYSTEM: EMBEDDINGS
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define embedding backends for vector representation.
#  Each embedder implements:
#    - embed_text(text: str) → NDArray[float]
#    - embed_batch(texts: List[str]) → NDArray[float]
#    - dimension() → int

embedding_backends:
  builtin:
    - name: "sentence-transformers"
      module: "src.core.embeddings.sentence_transformer_embedder"
      class: "SentenceTransformerEmbedder"
      dependencies:
        - sentence-transformers>=2.2.2
      models:
        - id: "all-MiniLM-L6-v2"
          dimension: 384
          max_tokens: 256
          speed: "fast"
          local: true

        - id: "all-mpnet-base-v2"
          dimension: 768
          max_tokens: 384
          speed: "medium"
          local: true

        - id: "e5-large-v2"
          dimension: 1024
          max_tokens: 512
          speed: "slow"
          local: true
          requires_prefix: true

    - name: "openai-embeddings"
      module: "src.core.embeddings.openai_embedder"
      class: "OpenAIEmbedder"
      dependencies:
        - openai>=1.0.0
      models:
        - id: "text-embedding-3-small"
          dimension: 1536
          max_tokens: 8191
          speed: "fast"
          local: false

        - id: "text-embedding-3-large"
          dimension: 3072
          max_tokens: 8191
          speed: "medium"
          local: false

  plugins:
    - id: "cohere_embeddings"
      name: "Cohere Embeddings"
      module: "plugins.embeddings.cohere_embedder"
      class: "CohereEmbedderPlugin"
      version: "1.0.0"
      dependencies:
        - cohere>=4.0.0
      enabled: false

    - id: "jina_embeddings"
      name: "Jina AI Embeddings"
      module: "plugins.embeddings.jina_embedder"
      class: "JinaEmbedderPlugin"
      version: "1.0.0"
      dependencies:
        - jinaai>=0.1.0
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: VECTOR STORES
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define vector database backends.
#  Each store implements:
#    - add(vectors: NDArray, metadata: dict) → List[str]
#    - search(query_vector: NDArray, k: int) → List[Result]
#    - delete(ids: List[str]) → bool

vector_stores:
  builtin:
    - name: "faiss"
      module: "src.storage.vector_stores.faiss_store"
      class: "FAISSVectorStore"
      dependencies:
        - faiss-cpu>=1.7.4
      config:
        path_env: "FAISS_INDEX_PATH"
        path: "data/vector_store"
        index_type: "IVFFlat"  # or "HNSW", "IDMap"
        nprobe: 10
      supports_deletion: true
      supports_metadata: true

  plugins:
    - id: "pinecone"
      name: "Pinecone (Cloud)"
      module: "plugins.vector_stores.pinecone_store"
      class: "PineconeVectorStorePlugin"
      version: "1.0.0"
      dependencies:
        - pinecone-client>=2.2.0
      config:
        api_key_env: "PINECONE_API_KEY"
        environment_env: "PINECONE_ENVIRONMENT"
        index_name: "mini-notebooklm"
      enabled: false

    - id: "weaviate"
      name: "Weaviate"
      module: "plugins.vector_stores.weaviate_store"
      class: "WeaviateVectorStorePlugin"
      version: "1.0.0"
      dependencies:
        - weaviate-client>=3.0.0
      config:
        url_env: "WEAVIATE_URL"
        api_key_env: "WEAVIATE_API_KEY"
      enabled: false

    - id: "qdrant"
      name: "Qdrant"
      module: "plugins.vector_stores.qdrant_store"
      class: "QdrantVectorStorePlugin"
      version: "1.0.0"
      dependencies:
        - qdrant-client>=1.7.0
      config:
        url_env: "QDRANT_URL"
        collection_name: "mini_notebooklm"
      enabled: false

    - id: "milvus"
      name: "Milvus"
      module: "plugins.vector_stores.milvus_store"
      class: "MilvusVectorStorePlugin"
      version: "1.0.0"
      dependencies:
        - pymilvus>=2.3.0
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: DOCUMENT PROCESSORS
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define document parsing and content extraction.
#  Each processor implements:
#    - process(file_path: str, **kwargs) → str
#    - supported_formats() → List[str]

document_processors:
  builtin:
    - name: "pdf"
      module: "src.ingestion.processors.pdf_processor"
      class: "PDFProcessor"
      dependencies:
        - pypdf>=3.17.0
      formats:
        - ".pdf"
      supports_ocr: false

    - name: "text"
      module: "src.ingestion.processors.text_processor"
      class: "TextProcessor"
      dependencies: []
      formats:
        - ".txt"
        - ".md"
        - ".rst"

    - name: "csv"
      module: "src.ingestion.processors.csv_processor"
      class: "CSVProcessor"
      dependencies:
        - pandas>=2.0.0
      formats:
        - ".csv"
        - ".tsv"

    - name: "web"
      module: "src.ingestion.processors.web_processor"
      class: "TrafilaturaWebProcessor"
      dependencies:
        - trafilatura>=1.6.0
      formats:
        - "http"
        - "https"

    - name: "youtube"
      module: "src.ingestion.processors.youtube_processor"
      class: "YoutubeProcessor"
      dependencies:
        - youtube-transcript-api>=0.6.1
      formats:
        - "youtube"

  plugins:
    - id: "docx"
      name: "Microsoft Word (DOCX)"
      module: "plugins.processors.docx_processor"
      class: "DOCXProcessorPlugin"
      version: "1.0.0"
      dependencies:
        - python-docx>=0.8.11
      formats:
        - ".docx"
      enabled: false

    - id: "pptx"
      name: "PowerPoint (PPTX)"
      module: "plugins.processors.pptx_processor"
      class: "PPTXProcessorPlugin"
      version: "1.0.0"
      dependencies:
        - python-pptx>=0.6.21
      formats:
        - ".pptx"
      enabled: false

    - id: "epub"
      name: "EPUB Reader"
      module: "plugins.processors.epub_processor"
      class: "EPUBProcessorPlugin"
      version: "1.0.0"
      dependencies:
        - ebooklib>=0.18.0
      formats:
        - ".epub"
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: CHUNKING STRATEGIES
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define document segmentation strategies.
#  Each chunker implements:
#    - chunk(text: str, **kwargs) → List[Chunk]
#    - recommend_strategy(text: str, doc_type: str) → str

chunking_strategies:
  builtin:
    - id: "recursive"
      name: "Recursive Character Split"
      module: "src.ingestion.chunking.recursive_chunker"
      class: "RecursiveCharacterChunker"
      dependencies:
        - langchain-text-splitters>=0.3.0
      config:
        chunk_size: 512
        chunk_overlap: 64
      best_for: ["general", "mixed"]

    - id: "paragraph"
      name: "Paragraph-Based"
      module: "src.ingestion.chunking.paragraph_chunker"
      class: "ParagraphChunker"
      dependencies: []
      config:
        min_para_length: 100
      best_for: ["longform", "articles"]

    - id: "page"
      name: "Page-Based"
      module: "src.ingestion.chunking.page_chunker"
      class: "PageChunker"
      dependencies: []
      config:
        page_size: 2048
      best_for: ["pdf"]

    - id: "semantic"
      name: "Semantic Clustering"
      module: "src.ingestion.chunking.semantic_chunker"
      class: "SemanticChunker"
      dependencies:
        - sentence-transformers>=2.2.2
      config:
        embedding_model: "all-MiniLM-L6-v2"
        breakpoint_threshold_type: "percentile"
      best_for: ["narrative", "research"]

    - id: "hierarchical"
      name: "Hierarchical Decomposition"
      module: "src.ingestion.chunking.hierarchical_chunker"
      class: "HierarchicalChunker"
      dependencies: []
      config:
        max_depth: 3
      best_for: ["structured", "technical"]

  plugins:
    - id: "sentence"
      name: "Sentence-Level Chunking"
      module: "plugins.chunking.sentence_chunker"
      class: "SentenceChunkerPlugin"
      version: "1.0.0"
      dependencies:
        - nltk>=3.8.0
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: RETRIEVAL STRATEGIES
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define context retrieval methods.
#  Each retriever implements:
#    - retrieve(query: str, k: int) → List[Result]

retrieval_backends:
  builtin:
    - id: "hybrid"
      name: "Hybrid (Semantic + BM25)"
      module: "src.retrieval.hybrid_retriever"
      class: "HybridRetriever"
      dependencies:
        - rank-bm25>=0.2.2
      config:
        semantic_weight: 0.7
        bm25_weight: 0.3
        rerank: true

    - id: "semantic"
      name: "Semantic (Vector Similarity)"
      module: "src.retrieval.semantic_retriever"
      class: "SemanticRetriever"
      dependencies: []

    - id: "bm25"
      name: "BM25 (Full-Text)"
      module: "src.retrieval.bm25_retriever"
      class: "BM25Retriever"
      dependencies:
        - rank-bm25>=0.2.2

  plugins:
    - id: "reranker"
      name: "Cross-Encoder Reranking"
      module: "plugins.retrieval.reranker"
      class: "RerankerPlugin"
      version: "1.0.0"
      dependencies:
        - sentence-transformers>=2.2.2
      config:
        model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: EVALUATION METRICS
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define answer quality evaluation.
#  Each evaluator implements:
#    - evaluate(question: str, answer: str, context: List[str]) → EvalResult

evaluators:
  builtin:
    - id: "ragas"
      name: "RAGAS (Retrieval-Augmented Generation Assessment)"
      module: "src.evaluation.ragas_evaluator"
      class: "RAGASEvaluator"
      dependencies:
        - ragas>=0.1.0
      metrics:
        - "faithfulness"
        - "answer_relevance"
        - "context_precision"
        - "context_recall"
      config:
        batch_size: 10
        llm_model: "gpt-3.5-turbo"

    - id: "rouge"
      name: "ROUGE (Reference-Based)"
      module: "src.evaluation.rouge_evaluator"
      class: "ROUGEEvaluator"
      dependencies:
        - rouge-score>=0.1.2
      metrics:
        - "rouge1"
        - "rouge2"
        - "rougeL"

  plugins:
    - id: "deepeval"
      name: "DeepEval (LLM-Based)"
      module: "plugins.evaluation.deepeval_evaluator"
      class: "DeepEvalPlugin"
      version: "1.0.0"
      dependencies:
        - deepeval>=0.20.0
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: KNOWLEDGE GRAPHS
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define knowledge representation backends.

knowledge_graph_backends:
  builtin:
    - id: "networkx"
      name: "NetworkX (In-Memory Graph)"
      module: "src.graph.networkx_graph"
      class: "NetworkXGraph"
      dependencies:
        - networkx>=3.0
      config:
        path_env: "GRAPH_STORAGE_PATH"
        path: "data/graph"
      supports_persistence: true

  plugins:
    - id: "neo4j"
      name: "Neo4j (Property Graph)"
      module: "plugins.graph.neo4j_graph"
      class: "Neo4jGraphPlugin"
      version: "1.0.0"
      dependencies:
        - neo4j>=5.0.0
      config:
        url_env: "NEO4J_URI"
        user_env: "NEO4J_USER"
        password_env: "NEO4J_PASSWORD"
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  SUBSYSTEM: STORAGE BACKENDS
# ═════════════════════════════════════════════════════════════════════════════
#
#  Plugins define metadata and chat history persistence.

storage_backends:
  builtin:
    - id: "sqlite"
      name: "SQLite (Local Database)"
      module: "src.storage.sqlite_manager"
      class: "SQLiteStorageManager"
      dependencies:
        - sqlite3  # builtin
      config:
        db_path_env: "SQLITE_DB_PATH"
        db_path: "data/sources.db"
      supports_transactions: true

  plugins:
    - id: "postgresql"
      name: "PostgreSQL"
      module: "plugins.storage.postgres_manager"
      class: "PostgresStoragePlugin"
      version: "1.0.0"
      dependencies:
        - psycopg2-binary>=2.9.0
        - sqlalchemy>=2.0.0
      config:
        connection_string_env: "DATABASE_URL"
      enabled: false

    - id: "mongodb"
      name: "MongoDB"
      module: "plugins.storage.mongo_manager"
      class: "MongoStoragePlugin"
      version: "1.0.0"
      dependencies:
        - pymongo>=4.0.0
      config:
        uri_env: "MONGODB_URI"
      enabled: false

# ═════════════════════════════════════════════════════════════════════════════
#  PLUGIN REGISTRY & LIFECYCLE
# ═════════════════════════════════════════════════════════════════════════════

plugin_registry:
  auto_load: true
  load_order:
    1. "llm_providers"
    2. "embedding_backends"
    3. "vector_stores"
    4. "document_processors"
    5. "chunking_strategies"
    6. "retrieval_backends"
    7. "evaluators"
    8. "knowledge_graph_backends"
    9. "storage_backends"

  # Plugin initialization hooks
  hooks:
    on_plugin_load: "src.plugins.lifecycle.on_plugin_load"
    on_plugin_unload: "src.plugins.lifecycle.on_plugin_unload"
    on_config_change: "src.plugins.lifecycle.on_config_change"

# ═════════════════════════════════════════════════════════════════════════════
#  EXAMPLE: CUSTOM PLUGIN IMPLEMENTATION
# ═════════════════════════════════════════════════════════════════════════════
#
#  To add a custom plugin, create a YAML entry like:
#
#  llm_providers:
#    plugins:
#      - id: "my_custom_llm"
#        name: "My Custom LLM"
#        module: "plugins.llm.my_custom_llm"
#        class: "MyCustomLLMPlugin"
#        version: "1.0.0"
#        author: "your_name"
#        dependencies:
#          - custom-lib>=1.0.0
#        config:
#          api_key_env: "MY_CUSTOM_LLM_KEY"
#        enabled: true
#
#  Then implement in plugins/llm/my_custom_llm.py:
#
#  from src.core.llm import BaseLLM
#
#  class MyCustomLLMPlugin(BaseLLM):
#      def invoke(self, prompt: str, **kwargs) -> str:
#          # Implementation
#          pass
#
#      def stream(self, prompt: str, **kwargs) -> Iterator[str]:
#          # Implementation
#          pass
#
# ═════════════════════════════════════════════════════════════════════════════
