# plugin_config.yaml — Mini NotebookLM plugin & feature flags
# All values can be overridden by environment variables (see .env).

# ── LLM ────────────────────────────────────────────────────────────────────
llm:
  provider:     groq                        # groq | openai | gemini | ollama | anthropic
  model:        llama-3.1-70b-versatile
  temperature:  0.7
  max_tokens:   1024
  # provider-specific overrides
  groq:
    model:      llama-3.1-70b-versatile
  openai:
    model:      gpt-4o-mini
  gemini:
    model:      gemini-1.5-flash
  ollama:
    model:      llama3
    base_url:   http://localhost:11434
  anthropic:
    model:      claude-3-haiku-20240307

# ── Embeddings ─────────────────────────────────────────────────────────────
embeddings:
  default_model:  all-MiniLM-L6-v2          # local HuggingFace model
  device:         cpu                        # cpu | cuda | mps
  batch_size:     64
  cache_dir:      ./data/model_cache

# ── Vector Store ───────────────────────────────────────────────────────────
vector_store:
  backend:        chroma                     # chroma | faiss | qdrant
  persist_dir:    ./data/chroma
  collection:     mini_notebooklm

# ── Retrieval ──────────────────────────────────────────────────────────────
retrieval:
  k:              6                          # chunks returned per query
  rewrite:        true                       # HyDE / query expansion
  strategy:       auto                       # auto | hyde | expand | both
  rrf_k:          60                         # RRF constant
  dense_weight:   0.6
  sparse_weight:  0.4

# ── Chunking ───────────────────────────────────────────────────────────────
chunking:
  default_strategy: recursive
  chunk_size:       512
  chunk_overlap:    64
  adaptive:         true                     # auto-select strategy per doc type

# ── Generation Modes ───────────────────────────────────────────────────────
generation:
  default_mode:     chat                     # chat | study | research
  stream:           false
  max_history_turns: 8

  chat:
    default_persona: sagan
    default_tone:    neutral
    default_length:  medium

  study:
    quiz_cards:       true
    summary_bullets:  true
    learning_path:    true
    max_cards:        5

  research:
    sub_queries:      true
    max_sub_queries:  4
    deep_dive:        true

# ── RAGAS Evaluation ───────────────────────────────────────────────────────
evaluation:
  auto_evaluate:   false                     # run RAGAS on every query
  faithfulness_weight:   0.40
  relevance_weight:      0.35
  precision_weight:      0.25
  history_maxlen:        50

# ── API ────────────────────────────────────────────────────────────────────
api:
  host:            0.0.0.0
  port:            8000
  workers:         1
  max_upload_mb:   50
  cors_origins:
    - http://localhost:5173
    - http://localhost:4173
    - http://localhost:3000
    - http://localhost:8501

# ── Ingestion Source Plugins ───────────────────────────────────────────────
plugins:
  pdf:
    enabled:  true
    loader:   pymupdf                        # pymupdf | pypdf | pdfplumber
  web:
    enabled:  true
    loader:   trafilatura                    # trafilatura | beautifulsoup
    timeout:  30
  youtube:
    enabled:  true
    loader:   youtube_transcript_api
  csv:
    enabled:  true
  audio:
    enabled:  false                          # requires whisper
    model:    whisper-1
  image:
    enabled:  false                          # requires vision LLM

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:   INFO                              # DEBUG | INFO | WARNING | ERROR
  format:  "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
  file:    null                              # set to ./data/logs/app.log to enable