[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files  = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
  "-v",
  "--tb=short",
  "--strict-markers",
  "--disable-warnings",
]
markers = [
  "unit: pure unit tests, no I/O",
  "integration: integration tests (FastAPI TestClient)",
  "e2e: end-to-end Playwright tests",
  "slow: tests that take > 5 s",
]

[tool.coverage.run]
source = ["src", "api"]
omit = [
  "*/tests/*",
  "*/__pycache__/*",
  "*/migrations/*",
  "src/ui/*",
]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered  = false
fail_under   = 40
exclude_lines = [
  "pragma: no cover",
  "def __repr__",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
]
