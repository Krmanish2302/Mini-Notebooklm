name: Mini-NotebookLM Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
jobs:

  # ===== 1. UNIT TESTS =======================================================
  unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Create test stubs if tests/unit is empty
        run: |
          mkdir -p tests/unit
          if [ ! -f tests/unit/__init__.py ]; then
            touch tests/unit/__init__.py
          fi
          # If no test files at all, create a placeholder so pytest doesn't error
          if ! find tests/unit -name 'test_*.py' | grep -q .; then
            cat > tests/unit/test_placeholder.py << 'PYEOF'
          def test_placeholder_unit():
              """Placeholder — replace with real tests."""
              assert True
          PYEOF
          fi

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          TESTING: "1"
        run: |
          python -m pytest tests/unit \
            -v \
            --tb=short \
            --maxfail=10 \
            --disable-warnings \
            --cov=src \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit-${{ matrix.python-version }}.xml

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-py${{ matrix.python-version }}
          path: coverage-unit-${{ matrix.python-version }}.xml
          retention-days: 7

  # ===== 2. INTEGRATION TESTS ================================================
  integration:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Create test stubs if tests/integration is empty
        run: |
          mkdir -p tests/integration
          if [ ! -f tests/integration/__init__.py ]; then
            touch tests/integration/__init__.py
          fi
          if ! find tests/integration -name 'test_*.py' | grep -q .; then
            cat > tests/integration/test_placeholder.py << 'PYEOF'
          def test_placeholder_integration():
              """Placeholder — replace with real integration tests."""
              assert True
          PYEOF
          fi

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          TESTING: "1"
        run: |
          python -m pytest tests/integration \
            -v \
            --tb=short \
            --maxfail=10 \
            --disable-warnings \
            --cov=src \
            --cov=api \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration-${{ matrix.python-version }}.xml

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-py${{ matrix.python-version }}
          path: coverage-integration-${{ matrix.python-version }}.xml
          retention-days: 7

  # ===== 3. FRONTEND UNIT (Vitest) — only if package.json present =============
  frontend-unit:
    name: Frontend Unit (Node 22)
    runs-on: ubuntu-latest
    # Skip gracefully when no frontend package.json is present
    if: |
      hashFiles('package.json') != '' ||
      hashFiles('frontend/package.json') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Detect frontend directory
        id: fdir
        run: |
          if [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ steps.fdir.outputs.dir }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Vitest
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: npm run test -- --run --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ${{ steps.fdir.outputs.dir }}/coverage
          retention-days: 7

  # ===== 4. E2E — Playwright Chromium ========================================
  e2e:
    name: E2E (Playwright Chromium)
    runs-on: ubuntu-latest
    needs: [unit, integration]
    # Skip gracefully when no frontend package.json is present
    if: |
      hashFiles('package.json') != '' ||
      hashFiles('frontend/package.json') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Detect frontend directory
        id: fdir
        run: |
          if [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ steps.fdir.outputs.dir }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright + Chromium
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: npx playwright install --with-deps chromium

      - name: Start FastAPI server
        env:
          PYTHONPATH: ${{ github.workspace }}
          TESTING: "1"
        run: |
          nohup python -m uvicorn api:app \
            --host 127.0.0.1 \
            --port 8000 \
            --log-level warning > uvicorn.log 2>&1 &
          echo "Waiting for /api/health ..."
          for i in $(seq 1 45); do
            status=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1:8000/api/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "API ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start — dumping log:"
          cat uvicorn.log
          exit 1

      - name: Run Playwright E2E tests
        working-directory: ${{ steps.fdir.outputs.dir }}
        env:
          BASE_URL: http://127.0.0.1:3000
          API_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            frontend/playwright-report/
            test-results/
            frontend/test-results/
          retention-days: 7

      - name: Upload uvicorn log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: uvicorn.log
          retention-days: 3

  # ===== 5. STATUS GATE =======================================================
  all-tests-pass:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.unit.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          echo "All required tests passed."
