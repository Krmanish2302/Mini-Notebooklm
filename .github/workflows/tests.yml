name: tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Python: Unit + Integration Tests ────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python-version }} — Unit + Integration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
          TESTING: "1"
        run: |
          pytest tests/unit \
            -v \
            --maxfail=5 \
            --disable-warnings \
            --cov=api \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Run integration tests
        env:
          PYTHONPATH: .
          TESTING: "1"
        run: |
          pytest tests/integration \
            -v \
            --maxfail=5 \
            --disable-warnings \
            --cov=api \
            --cov=src \
            --cov-append \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage-unit.xml
            coverage-integration.xml
          retention-days: 7

  # ── 2. Frontend: Vitest Component Tests ────────────────────────────────────
  frontend-unit:
    name: Frontend Unit (Node 22)
    runs-on: ubuntu-latest
    # only run if a package.json exists
    if: ${{ hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Detect frontend root
        id: fdir
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Install frontend dependencies
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Run Vitest unit tests
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: npm run test -- --run --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: ${{ steps.fdir.outputs.dir }}/coverage
          retention-days: 7

  # ── 3. E2E: Playwright (Chromium only) ─────────────────────────────────────
  e2e:
    name: E2E — Playwright Chromium
    runs-on: ubuntu-latest
    needs: [python-tests]
    if: ${{ hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Detect frontend root
        id: fdir
        shell: bash
        run: |
          if [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Install frontend dependencies
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Playwright Chromium
        working-directory: ${{ steps.fdir.outputs.dir }}
        run: npx playwright install --with-deps chromium

      - name: Start API server
        env:
          PYTHONPATH: .
          TESTING: "1"
        run: |
          nohup python -m uvicorn api:app \
            --host 127.0.0.1 \
            --port 8000 \
            --log-level warning > uvicorn.log 2>&1 &
          echo "Waiting for API..."
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "API ready after ${i} attempts"
              break
            fi
            sleep 2
          done

      - name: Run Playwright E2E tests
        working-directory: ${{ steps.fdir.outputs.dir }}
        env:
          BASE_URL: http://127.0.0.1:3000
          API_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            frontend/playwright-report/
            test-results/
            frontend/test-results/
          retention-days: 7

      - name: Upload API server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: uvicorn-log
          path: uvicorn.log
          retention-days: 3
