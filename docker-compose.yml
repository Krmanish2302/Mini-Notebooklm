version: "3.9"

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: mini_notebooklm_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8501,http://localhost:3000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data          # persist vector store + uploads
      - ./src:/app/src:ro         # hot-reload source without rebuild
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      uvicorn api:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir src

  # ── Streamlit frontend ──────────────────────────────────────────────────
  ui:
    build:
      context: .
      target: runtime
    container_name: mini_notebooklm_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - STREAMLIT_API_URL=http://api:8000/api
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src:ro
    depends_on:
      api:
        condition: service_healthy
    command: >
      streamlit run streamlit_app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --browser.gatherUsageStats false

volumes:
  data: